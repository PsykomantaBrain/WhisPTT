<svg width="680" height="383" viewBox="0 0 680 383" xmlns="http://www.w3.org/2000/svg" role="img">
<title>WhisPTT</title>
<desc>Push-to-talk voice dictation for the Steam Deck.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0d1426"/>
    <stop offset="1" stop-color="#1b2747"/>
  </linearGradient>
  <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#a78bfa"/>
    <stop offset="1" stop-color="#22d3ee"/>
  </linearGradient>
  <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.45"/>
    <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect x="0" y="0" width="680" height="383" rx="24" fill="url(#bg)"/>
<circle cx="172" cy="192" r="172" fill="url(#glow)"/>

<g fill="none" stroke="url(#acc)" stroke-linecap="round">
  <path d="M270 168 a32 32 0 0 1 0 48" stroke-width="6" opacity="0.9"/>
  <path d="M288 153 a50 50 0 0 1 0 78" stroke-width="6" opacity="0.55"/>
  <path d="M306 140 a68 68 0 0 1 0 104" stroke-width="6" opacity="0.3"/>
</g>

<circle cx="172" cy="192" r="90" fill="#0e1730" stroke="url(#acc)" stroke-width="4"/>
<rect x="156" y="148" width="32" height="60" rx="16" fill="#ffffff"/>
<g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
  <path d="M140 200 a32 32 0 0 0 64 0"/>
  <line x1="172" y1="232" x2="172" y2="250"/>
  <line x1="156" y1="250" x2="188" y2="250"/>
</g>

<text x="350" y="210" font-family="'Segoe UI', system-ui, 'DejaVu Sans', Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-1">Whis<tspan fill="url(#acc)">PTT</tspan></text>
<text x="352" y="250" font-family="'Segoe UI', system-ui, 'DejaVu Sans', Arial, sans-serif" font-size="20" font-weight="500" fill="#9fb0cf">Push-to-talk voice dictation</text>
<text x="352" y="286" font-family="'Segoe UI', system-ui, 'DejaVu Sans', Arial, sans-serif" font-size="15" font-weight="400" fill="#5d6f8f">Powered by OpenAI Whisper</text>
</svg>
